name: API CI

on:
  push:
    paths:
      - 'apps/api/**'
      - 'packages/db/**'
      - '.github/workflows/api-ci.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.base.json'
      - 'eslint.config.js'
      - '.prettierrc'
  pull_request:
    paths:
      - 'apps/api/**'
      - 'packages/db/**'
      - '.github/workflows/api-ci.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.base.json'
      - 'eslint.config.js'
      - '.prettierrc'

concurrency:
  group: api-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-build:
    name: Lint, test and build API
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Lint API
        run: npm run lint --workspace=apps/api
      - name: Prettier check API
        run: npm run format:check --workspace=apps/api
      - name: Type check API
        run: npm run type-check --workspace=apps/api
      - name: Test API
        run: npm run test --workspace=apps/api -- --runInBand
      - name: Build API
        run: npm run build --workspace=apps/api
